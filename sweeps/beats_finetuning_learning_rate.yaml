program: src/dcase2026_task1/experiments/beats_finetuning.py
project: dcase2026-task1
method: bayes
metric:
  name: val/hierarchical_f1
  goal: maximize

parameters:
  learning_rate:
    distribution: log_uniform_values
    min: !!float 5e-6
    max: !!float 5e-5
  weight_decay:
    value: 0.0
  warmup_epochs:
    value: 0
  lr_decay_start_epoch:
    value: 20
  min_learning_rate:
    value: !!float 1e-7
  max_epochs:
    values: 20

command:
  - ${env}
  - ${interpreter}
  - -m
  - dcase2026_task1.experiments.beats_finetuning
  - --wandb-project=dcase2026-task1
  - --wandb-mode=online
  - ${args}
