program: src/dcase2026_task1/experiments/training.py
project: dcase2026-task1
method: bayes
run_cap: 20
metric:
  name: val/hierarchical_f1
  goal: maximize

parameters:
  learning_rate:
    value: !!float 5e-6
  weight_decay:
    value: 0.01
  llm_prior_noise_p_swap:
    distribution: uniform
    min: 0.0
    max: 0.2
  llm_prior_noise_p_drop:
    distribution: uniform
    min: 0.0
    max: 0.1
  warmup_epochs:
    value: 1
  lr_decay_start_epoch:
    value: 2
  min_learning_rate:
    value: !!float 1e-7
  max_epochs:
    value: 20


command:
  - ${env}
  - ${interpreter}
  - -m
  - dcase2026_task1.experiments.training
  - --wandb-project=dcase2026-task1
  - --wandb-mode=online
  - --use-llm-prior-embedding-fusion
  - --use-class-frequency-loss
  - --embedding-model=m2d
  - --batch-size=18
  - --save-checkpoints
  - ${args}
