program: src/dcase2026_task1/experiments/training.py
project: dcase2026-task1
method: random
run_cap: 20
metric:
  name: val/hierarchical_f1
  goal: maximize

parameters:
  learning_rate:
    distribution: log_uniform_values
    min: !!float 2e-6
    max: !!float 5e-6
  weight_decay:
    value: 0.01
  pseudo_label_weight:
    distribution: uniform
    min: 0.75
    max: 1.0
  warmup_epochs:
    value: 1
  lr_decay_start_epoch:
    value: 2
  min_learning_rate:
    value: !!float 1e-7
  max_epochs:
    value: 15


command:
  - ${env}
  - ${interpreter}
  - -m
  - dcase2026_task1.experiments.training
  - --wandb-project=dcase2026-task1
  - --wandb-mode=online
  - --use-llm-prior-embedding-fusion
  - --use-class-frequency-loss
  - --embedding-model=clap
  - --batch-size=18
  - --save-checkpoints
  - --only-bsd35k-cs
  - --pseudo-label-dir=ensemble_20260613_113224_BSD10k_passt_488a3c43__20260613_140743_BSD10k_beats_b958ff06__20260613_154036_BSD10k_m2d_eb803a11__20260613_160721_BSD10k_clap_4d86ad60__20260613_174359_BSD10k_clap_2c27c2b1
  - ${args}
