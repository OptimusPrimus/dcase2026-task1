program: src/dcase2026_task1/experiments/training.py
project: dcase2026-task1
method: random
run_cap: 3
metric:
  name: val/hierarchical_f1
  goal: maximize

parameters:
  learning_rate:
    value: !!float 4.0e-6
  weight_decay:
    value: 0.01
  warmup_epochs:
    value: 1
  lr_decay_start_epoch:
    value: 1
  min_learning_rate:
    value: !!float 0.0
  max_epochs:
    value: 30
  seed:
    values: [865021, 327521, 22282]

command:
  - ${env}
  - ${interpreter}
  - -m
  - dcase2026_task1.experiments.training
  - --wandb-project=dcase2026-task1
  - --wandb-mode=online
  - --embedding-model=lclap_text
  - --batch-size=18
  - --save-checkpoints
  - ${args}