program: src/dcase2026_task1/experiments/training.py
project: dcase2026-task1
method: random
run_cap: 20
metric:
  name: val/hierarchical_f1
  goal: maximize

parameters:
  learning_rate:
    value: !!float 4e-6
  weight_decay:
    value: 0.01
  warmup_epochs:
    value: 1
  lr_decay_start_epoch:
    value: 1
  min_learning_rate:
    value: !!float 0.0
  max_epochs:
    value: 30
  head_hidden_dim:
    value: 2048
  head_hidden_layers:
    values: [1, 2, 3, 4]

command:
  - ${env}
  - ${interpreter}
  - -m
  - dcase2026_task1.experiments.training
  - --wandb-project=dcase2026-task1
  - --wandb-mode=online
  - --embedding-model=m2d_te
  - --batch-size=18
  - --save-checkpoints
  - ${args}