program: src/dcase2026_task1/experiments/training.py
project: dcase2026-task1
method: grid
run_cap: 12

metric:
  name: val/hierarchical_f1
  goal: maximize

parameters:
  learning_rate:
    values:
      - !!float 1e-6
      - !!float 2e-6
      - !!float 3e-6
      - !!float 4e-6
  weight_decay:
    value: 0.01
  warmup_epochs:
    value: 1
  lr_decay_start_epoch:
    value: 1
  min_learning_rate:
    value: !!float 0.0
  max_epochs:
    values:
      - 5
      - 10
      - 15
  init_checkpoint_path:
    values: [20260705_152418_BSD35k-CS_train_only_lclap_7c0503e1]

command:
  - ${env}
  - ${interpreter}
  - -m
  - dcase2026_task1.experiments.training
  - --wandb-project=dcase2026-task1
  - --wandb-mode=online
  - --embedding-model=lclap
  - --use-llm-prior-embedding-fusion
  - --batch-size=18
  - --save-checkpoints
  - --early-stopping-patience=30
  - ${args}