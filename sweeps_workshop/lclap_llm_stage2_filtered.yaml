program: src/dcase2026_task1/experiments/training.py
project: dcase2026-task1
method: grid
run_cap: 12

metric:
  name: val/hierarchical_f1
  goal: maximize

parameters:
  learning_rate:
    values:
      - !!float 4e-6
  bsd35k_pseudo_label_confidence_retention:
    values:
      - !!float 0.1
      - !!float 0.2
      - !!float 0.3
      - !!float 0.4
  pseudo_label_weight:
    value: 0.99
  weight_decay:
    value: 0.01
  warmup_epochs:
    value: 1
  lr_decay_start_epoch:
    value: 1
  min_learning_rate:
    value: !!float 0.0
  max_epochs:
    value: 30
  pseudo_label_dir:
    values: ["ensemble_lclap_156d3c4c__m2d_0bc332a2__te_b0a05044", "ensemble_lclap_4b80bdf6__m2d_c8c424ed__te_26b40f98", "ensemble_lclap_7de5e021__m2d_418f3c46__te_a6d20f00"]


command:
  - ${env}
  - ${interpreter}
  - -m
  - dcase2026_task1.experiments.training
  - --only-bsd35k-cs
  - --wandb-project=dcase2026-task1
  - --wandb-mode=online
  - --embedding-model=lclap
  - --use-llm-prior-embedding-fusion
  - --batch-size=18
  - --save-checkpoints

  - ${args}